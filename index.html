<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FitTracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="header-top">
        <div id="stage-badge" class="stage-badge">Etapa 0</div>
        <h1 class="app-title">FitTracker</h1>
        <button id="sync-btn" class="icon-btn" title="Sincronizar con Google Sheets">⟳</button>
      </div>
      <div class="header-meta">
        <span id="current-date"></span>
        <span id="week-info" class="muted"></span>
      </div>
    </header>

    <!-- Sync status toast -->
    <div id="sync-status" class="sync-status hidden"></div>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
      <button class="tab active" data-tab="today">Hoy</button>
      <button class="tab" data-tab="week">Semana</button>
      <button class="tab" data-tab="progress">Progreso</button>
      <button class="tab" data-tab="nutrition">Nutrición</button>
      <button class="tab" data-tab="config">Config</button>
    </nav>

    <!-- Tab Content -->
    <main id="main-content">
      <div id="tab-today"     class="tab-content active"></div>
      <div id="tab-week"      class="tab-content"></div>
      <div id="tab-progress"  class="tab-content"></div>
      <div id="tab-nutrition" class="tab-content"></div>
      <div id="tab-config"    class="tab-content"></div>
    </main>

  </div>

  <!-- Scripts (orden de dependencia) -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/firebase-sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
